<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f766e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <rect x="0" y="0" width="200" height="200" rx="40" fill="url(#logoGradient)" filter="url(#shadow)"/>
  
  <text x="50%" y="50%" text-anchor="middle" dominant-baseline="central" 
        fill="white" font-family="Arial, Helvetica, sans-serif" 
        font-weight="bold" font-size="80">
    3N
  </text>
</svg>
